<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carte d'Amour</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&family=IM+Fell+English:ital@1&family=Cormorant+Garamond:ital,wght@1,600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  background: #030308;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  user-select: none;
}

canvas#bg { position:fixed; inset:0; z-index:0; }

.scene {
  perspective: 1400px;
  z-index: 10;
  position: relative;
}

.card {
  width: 500px;
  height: 680px;
  position: relative;
  transform-style: preserve-3d;
  transition: transform 1.3s cubic-bezier(.4,0,.2,1);
}
.card.open { transform: rotateY(-180deg); }

.face {
  position: absolute;
  inset: 0;
  backface-visibility: hidden;
  -webkit-backface-visibility: hidden;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid rgba(180,148,60,0.4);
  box-shadow: 0 0 60px rgba(0,0,0,0.95), 0 0 30px rgba(180,148,60,0.1);
}

/* ══ FRONT ══ */
#front { background: #06060c; }

/* gold frame */
#front::before {
  content:'';
  position:absolute;
  inset:18px;
  border:1px solid rgba(180,148,60,0.5);
  border-radius:3px;
  z-index:2;
  pointer-events:none;
}

/* ── MOON ── */
#moon { position:absolute; right:48px; top:50px; z-index:10; pointer-events:none; transition:filter .4s; }
#moon.lit { filter: drop-shadow(0 0 20px rgba(212,176,60,.9)); }

/* ── SUN ── */
#sun { position:absolute; left:44px; top:44px; z-index:15; cursor:grab; touch-action:none; }
#sun:active { cursor:grabbing; }

/* hint */
#hint {
  position:absolute; bottom:34px; left:50%; transform:translateX(-50%);
  font-family:'IM Fell English',serif; font-style:italic;
  font-size:14px; color:rgba(180,148,60,.7); letter-spacing:2px;
  white-space:nowrap; z-index:20; animation:blink 2.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:.3} 50%{opacity:.9} }

/* particles */
.pt {
  position:absolute; pointer-events:none; z-index:22;
  animation:rise 1.8s ease-out forwards;
}
@keyframes rise {
  0%  { opacity:0; transform:translateY(0) scale(.5); }
  15% { opacity:1; transform:translateY(-10px) scale(1.1); }
  100%{ opacity:0; transform:translateY(-110px) scale(.6); }
}

/* ══ BACK ══ */
#back {
  background: #06060c;
  transform: rotateY(180deg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 0;
  padding: 50px 44px;
}

/* gold frame */
#back::before {
  content:'';
  position:absolute;
  inset:18px;
  border:1px solid rgba(180,148,60,0.5);
  border-radius:3px;
  pointer-events:none;
  z-index:1;
}

/* ── EMBLEM ── */
.emblem { z-index:5; margin-bottom:4px; }

/* ── DIVIDER ── */
.dv {
  display:flex; align-items:center; gap:10px;
  width:280px; margin:14px 0; z-index:5;
}
.dv-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(180,148,60,.6),transparent); }
.dv-gem  { width:7px; height:7px; background:#b8943f; transform:rotate(45deg); flex-shrink:0; }

/* ── TEXT ── */
.big {
  font-family: 'Cinzel Decorative', 'Georgia', serif;
  font-size: 40px;
  font-weight: 700;
  color: #d4b050;
  letter-spacing: 3px;
  text-align: center;
  text-shadow: 0 0 25px rgba(212,176,80,.7), 0 0 60px rgba(212,176,80,.25);
  z-index: 5;
  animation: glow 3s ease-in-out infinite alternate;
}
@keyframes glow {
  from { text-shadow:0 0 20px rgba(212,176,80,.5),0 0 40px rgba(212,176,80,.15); }
  to   { text-shadow:0 0 35px rgba(212,176,80,1), 0 0 80px rgba(212,176,80,.4); }
}

.sub {
  font-family: 'IM Fell English', 'Georgia', serif;
  font-style: italic;
  font-size: 16px;
  color: rgba(212,190,130,.65);
  letter-spacing: 1.5px;
  margin-top: 6px;
  z-index: 5;
}

.msg {
  font-family: 'IM Fell English', 'Georgia', serif;
  font-style: italic;
  font-size: 24px;
  line-height: 2;
  color: #e8d8a8;
  text-align: center;
  z-index: 5;
  margin-top: 10px;
}
.msg strong {
  font-style: normal;
  color: #d4b050;
  font-size: 26px;
}

.sig { display:flex; flex-direction:column; align-items:center; gap:6px; z-index:5; margin-top:20px; }
.sig-h { font-size:30px; animation:hb 1.3s ease-in-out infinite; filter:drop-shadow(0 0 10px rgba(200,50,50,.5)); }
@keyframes hb { 0%,100%{transform:scale(1)} 50%{transform:scale(1.18)} }
.sig-t { font-family:'IM Fell English','Georgia',serif; font-style:italic; font-size:14px; color:rgba(180,148,60,.6); letter-spacing:3px; }

/* corners */
.crn { position:absolute; width:54px; height:54px; z-index:6; pointer-events:none; }
.crn.tl{top:12px;left:12px}
.crn.tr{top:12px;right:12px;transform:scaleX(-1)}
.crn.bl{bottom:12px;left:12px;transform:scaleY(-1)}
.crn.br{bottom:12px;right:12px;transform:scale(-1,-1)}
</style>
</head>
<body>

  <div class="dv"><div class="dv-line"></div><div class="dv-gem"></div><div class="dv-line"></div></div>

  <p class="sub">— c'est ce que je deviens —</p>

    <strong>Je t'aime…</strong><br>
    voilà ce que je deviens<br>
    quand tu t'approches de moi.
  </p>

  <p class="msg" style="margin-top:18px; font-size:22px; opacity:.85;">
    Chaque jour devient une fête<br>
    depuis que je t'ai connue.
  </p>

  <div class="dv" style="margin-top:24px;"><div class="dv-line"></div><div class="dv-gem"></div><div class="dv-line"></div></div>

  <div class="sig">
    <span class="sig-h">♥</span>
    <span class="sig-t">pour toi, à jamais</span>
  </div>

</div><!-- /back -->
</div></div><!-- /card /scene -->

<style>
@keyframes spin { to{transform:rotate(360deg)} }
@keyframes arr  { 0%,100%{transform:translateY(-50%) translateX(0)} 50%{transform:translateY(-50%) translateX(-7px)} }
</style>

<script>
// ── Starfield ──────────────────────────────────────
const cv = document.getElementById('bg');
const cx = cv.getContext('2d');
let W, H, ST=[];
function rsz(){ W=cv.width=innerWidth; H=cv.height=innerHeight; }
rsz(); window.addEventListener('resize',rsz);
for(let i=0;i<300;i++) ST.push({x:Math.random()*9999,y:Math.random()*9999,r:Math.random()*1.5+.3,ph:Math.random()*Math.PI*2,sp:Math.random()*.007+.003});
function draw(t){
  cx.clearRect(0,0,W,H);
  for(const s of ST){
    s.x=s.x%W; s.y=s.y%H;
    const a=.15+.65*(0.5+0.5*Math.sin(t*s.sp+s.ph));
    cx.beginPath(); cx.arc(s.x,s.y,s.r,0,Math.PI*2);
    cx.fillStyle=`rgba(212,180,70,${a})`; cx.fill();
  }
  requestAnimationFrame(t2=>draw(t2*.001));
}
draw(0);

// ── Drag ──────────────────────────────────────────
const card=document.getElementById('card');
const sun=document.getElementById('sun');
const moon=document.getElementById('moon');
const hint=document.getElementById('hint');
const da=document.getElementById('da');
const pc=document.getElementById('pc');
const ec=document.getElementById('ec'), eo=document.getElementById('eo');
const es=document.getElementById('es'), sm=document.getElementById('sm');
const nm=document.getElementById('nm');

let drag=false, merged=false, ox=0, oy=0;

function mc(){
  const mr=moon.getBoundingClientRect(), cr=card.getBoundingClientRect();
  return{x:mr.left+mr.width/2-cr.left, y:mr.top+mr.height/2-cr.top};
}

sun.addEventListener('pointerdown',e=>{
  if(merged)return; drag=true; sun.setPointerCapture(e.pointerId);
  const r=sun.getBoundingClientRect();
  ox=e.clientX-r.left-67; oy=e.clientY-r.top-67;
  da.style.display='none'; hint.style.opacity='0';
  e.preventDefault();
});
document.addEventListener('pointermove',e=>{
  if(!drag)return;
  const cr=card.getBoundingClientRect();
  const nx=Math.max(0,Math.min(370,e.clientX-cr.left-ox-67));
  const ny=Math.max(0,Math.min(560,e.clientY-cr.top-oy-67));
  sun.style.left=nx+'px'; sun.style.top=ny+'px';
  const m=mc(), d=Math.hypot(m.x-(nx+67),m.y-(ny+67));
  happy(d<115);
  if(d<62&&!merged){merged=true;doMerge();}
});
document.addEventListener('pointerup',()=>{drag=false;});

function happy(on){
  moon.classList.toggle('lit',on);
  ec.style.opacity=on?'0':'1';
  eo.style.opacity=on?'1':'0';
  es.style.opacity=on?'1':'0';
  sm.style.opacity=on?'1':'0';
  nm.style.opacity=on?'0':'.45';
}
function doMerge(){
  happy(true);
  for(let i=0;i<16;i++) setTimeout(pt,i*110);
  hint.textContent='✦ تفتح البطاقة ✦'; hint.style.opacity='1';
  setTimeout(()=>card.classList.add('open'),1500);
}
const SYM=['✦','✧','⁕','♥','✿','❧','✸'];
function pt(){
  const h=document.createElement('div'); h.className='pt';
  h.textContent=SYM[Math.random()*SYM.length|0];
  const G=['#d4b050','#c8a030','#e8cc70','#b89030'];
  h.style.cssText=`color:${G[Math.random()*G.length|0]};left:${60+Math.random()*340}px;top:${60+Math.random()*260}px;font-size:${14+Math.random()*18}px;animation-delay:${Math.random()*.4}s;`;
  pc.appendChild(h); setTimeout(()=>h.remove(),2500);
}

// touch
sun.addEventListener('touchstart',e=>{const t=e.touches[0];sun.dispatchEvent(new PointerEvent('pointerdown',{clientX:t.clientX,clientY:t.clientY,pointerId:1}));},{passive:false});
document.addEventListener('touchmove',e=>{const t=e.touches[0];document.dispatchEvent(new PointerEvent('pointermove',{clientX:t.clientX,clientY:t.clientY}));e.preventDefault();},{passive:false});
document.addEventListener('touchend',()=>document.dispatchEvent(new PointerEvent('pointerup')));
</script>
</body>
</html>
